name: Publish to NuGet

on:
  push:
    tags:
      - 'V*'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  publish:
    name: Build & Publish
    runs-on: windows-latest
    permissions:
      id-token: write    # required for OIDC trusted publishing
      contents: write    # required for creating GitHub Releases

    environment: nuget

    steps:
      - name: Checkout code (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results

      - name: Pack CDS.CSharpScript2
        run: dotnet pack CDS.CSharpScript2/CDS.CSharpScript2.csproj --no-build --configuration Release --output ./artifacts

      - name: Pack CDS.CSharpScript2.ScintillaEditor
        run: dotnet pack CDS.CSharpScript2.ScintillaEditor/CDS.CSharpScript2.ScintillaEditor.csproj --no-build --configuration Release --output ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.nupkg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate with NuGet (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget-auth
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push packages to NuGet.org
        run: |
          foreach ($pkg in Get-ChildItem -Path ./artifacts -Filter "*.nupkg") {
            dotnet nuget push $pkg.FullName --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-auth.outputs.NUGET_API_KEY }} --skip-duplicate
          }

      - name: Push symbol packages to NuGet.org
        run: |
          foreach ($pkg in Get-ChildItem -Path ./artifacts -Filter "*.snupkg") {
            dotnet nuget push $pkg.FullName --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-auth.outputs.NUGET_API_KEY }} --skip-duplicate
          }
